
name: 'deploy'

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: 'Image tag to use'
        required: false
        type: string
      skip_build:
        description: 'If true, skip build/push steps'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    concurrency:
      group: build-or-deploy
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.4.0
        with:
          access_token: ${{ github.token }}

      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        if: ${{ !inputs.skip_build }}
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: ${{ !inputs.skip_build }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: jwalton/gh-find-current-pr@v1
        id: findPr
        with:
          state: all

      - name: Set TAG (input override or PR fallback)
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="pr-${{ steps.findPr.outputs.pr }}"
          fi
          echo "Using TAG=$TAG"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Check if tag exists
        id: check-tag
        continue-on-error: true
        run: |
          docker manifest inspect camer0/nico:${{ env.TAG }} > /dev/null

      - name: Build and push image
        if: ${{ steps.check-tag.outcome == 'failure' && !inputs.skip_build }}
        uses: docker/build-push-action@v5
        with:
          pull: true
          push: true
          tags: camer0/nico:${{ env.TAG }}
          context: .
          build-args: |
            CRYPT64=${{ secrets.CRYPT64 }}
          cache-from: type=registry,ref=camer0/nico:buildcache
          cache-to: type=registry,ref=camer0/nico:buildcache,mode=min
          file: .docker/image.dockerfile

      - name: Rename tag to :latest in Docker Hub
        if: ${{ !inputs.skip_build }}
        run: |
          docker buildx imagetools create camer0/nico:${{ env.TAG }} --tag camer0/nico:latest

      - name: Connect to Tailscale (OIDC)
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci

      - name: Verify Tailscale connection
        run: |
          STATE=$(tailscale status --json | jq -r '.BackendState')
          if [ "$STATE" != "Running" ]; then
            echo "❌ Tailscale failed to connect. BackendState: $STATE"
            exit 1
          fi
          echo "✅ Tailscale connected: $(tailscale ip -4)"

      - name: Deploy to Coolify
        if: always()
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "${COOLIFY_WEBHOOK}" ] || [ -z "${COOLIFY_TOKEN}" ]; then
            echo "Missing COOLIFY_WEBHOOK or COOLIFY_TOKEN; skipping deploy"
            exit 1
          fi

          curl --request GET "${COOLIFY_WEBHOOK}" \
            --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
            --fail --show-error --silent
